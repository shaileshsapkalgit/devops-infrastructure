name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ─────────────────────────────
  # JOB 1: PLAN (Automatic)
  # ─────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev/tfplan
          retention-days: 1

  # ─────────────────────────────
  # JOB 2: APPROVAL (Manual - Tum approve karo)
  # ─────────────────────────────
  approve:
    name: Wait for Approval
    runs-on: ubuntu-latest
    needs: plan          # Plan ke baad hi aayega
    environment: dev     # Yahan manual approval set karo!

    steps:
      - name: Approved!
        run: echo "Approved by ${{ github.actor }}"

  # ─────────────────────────────
  # JOB 3: APPLY (Approve hone ke baad automatic)
  # ─────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: approve       # Approve ke baad hi chalega!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/environments/dev

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply -auto-approve tfplan

      - name: Print Outputs
        working-directory: terraform/environments/dev
        run: terraform output