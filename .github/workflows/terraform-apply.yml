name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm:
        description: 'Type YES to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform fmt -check -recursive
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec - Security Scanner
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          soft_fail: true

      - name: Run checkov - Compliance Scanner
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/environments/${{ github.event.inputs.environment }}
          soft_fail: true

  plan:
    name: Terraform Plan - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform plan -out=tfplan -detailed-exitcode
        continue-on-error: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: terraform/environments/${{ github.event.inputs.environment }}/tfplan
          retention-days: 5

  apply:
    name: Terraform Apply - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: plan
    environment: ${{ github.event.inputs.environment }}
    if: github.event.inputs.confirm == 'YES'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: terraform/environments/${{ github.event.inputs.environment }}

      - name: Terraform Apply
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform apply -auto-approve tfplan

      - name: Print Outputs
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
        run: terraform output

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Terraform Apply Successful!"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Applied by: ${{ github.actor }}"
          echo "Run ID: ${{ github.run_id }}"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Terraform Apply Failed!"
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"